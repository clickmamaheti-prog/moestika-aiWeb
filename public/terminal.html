<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal — Moestika AI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #0a0a0d; overflow: hidden; }
        #terminal { height: 100vh; padding: 8px; }
        .xterm { height: 100%; }
        .xterm-viewport { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.12) transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
        .exit-btn {
            position: fixed; top: 12px; right: 16px; z-index: 100;
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.08); color: #a1a1aa;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: all .2s;
        }
        .exit-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>
    <button class="exit-btn" onclick="window.close()" title="Tutup Terminal">✕</button>
    <div id="terminal"></div>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script>
        const term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'bar',
            fontSize: 14,
            fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
            theme: {
                background: '#0a0a0d',
                foreground: '#e4e4e7',
                cursor: '#00d4ff',
                selectionBackground: 'rgba(0,212,255,0.25)',
                black: '#18181b', red: '#f87171', green: '#4ade80', yellow: '#fbbf24',
                blue: '#60a5fa', magenta: '#c084fc', cyan: '#67e8f9', white: '#e4e4e7',
                brightBlack: '#52525b', brightRed: '#f87171', brightGreen: '#4ade80',
                brightYellow: '#fbbf24', brightBlue: '#60a5fa', brightMagenta: '#c084fc',
                brightCyan: '#67e8f9', brightWhite: '#f4f4f5',
            },
            allowTransparency: true,
        });
        const fit = new FitAddon.FitAddon();
        term.loadAddon(fit);
        term.open(document.getElementById('terminal'));
        fit.fit();

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${location.host}/terminal`);
        ws.onopen = () => term.focus();
        ws.onmessage = (e) => term.write(e.data);
        ws.onclose = () => term.write('\r\n\x1b[31m[TERMINAL DISCONNECTED]\x1b[0m\r\n');
        term.onData((data) => ws.send(data));
        term.onResize(({ cols, rows }) => ws.send(JSON.stringify({ type: 'resize', cols, rows })));

        window.addEventListener('resize', () => fit.fit());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') window.close();
        });
    </script>
</body>
</html>
